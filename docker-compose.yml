version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: futmanager_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: futmanager
      MYSQL_USER: futuser
      MYSQL_PASSWORD: futpassword
    volumes:
      - futmanager_data:/var/lib/mysql
    networks:
      - futmanager_net
    restart: unless-stopped

volumes:
  futmanager_data:
    driver: local

networks:
  futmanager_net:
    driver: bridge
